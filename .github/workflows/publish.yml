name: Publish to npm

# Publishes the package to npm.
# - Automatically when a GitHub Release is published.
# - Manually from the Actions tab, optionally bumping the version first.
# Requires an NPM_TOKEN secret (an npm automation token) in the repo settings.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish: an exact version (e.g. 1.0.1) or a bump keyword (patch | minor | major). Leave blank to publish package.json as-is."
        required: false
        default: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # allow pushing the version bump commit + tag
      id-token: write # enables npm provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Resolve manual version
        id: version
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.version != '' }}
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          current_version="$(node -p "require('./package.json').version")"
          requested_version="${REQUESTED_VERSION#v}"

          if [[ ! "$requested_version" =~ ^(patch|minor|major|[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?)$ ]]; then
            echo "::error::Invalid version '$REQUESTED_VERSION'. Use patch, minor, major, or an exact semantic version."
            exit 1
          fi

          echo "value=$requested_version" >> "$GITHUB_OUTPUT"
          if [[ "$requested_version" == "$current_version" ]]; then
            echo "bump=false" >> "$GITHUB_OUTPUT"
            echo "package.json is already at $current_version; publishing without another version bump."
          else
            echo "bump=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        if: ${{ steps.version.outputs.bump == 'true' }}
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version "$VERSION" -m "release: v%s"
          git push --follow-tags

      - name: Build library
        run: npm run build:lib

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
